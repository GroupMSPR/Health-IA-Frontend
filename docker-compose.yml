services:
  frontend:
    container_name: healthai_frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - healthai_network

networks:
  healthai_network:
    name: healthai-coach-workspace_default
    external: true