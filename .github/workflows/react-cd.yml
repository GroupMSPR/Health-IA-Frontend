# ============================================================================
#  CD — Health-IA-Frontend (React Web)
# ============================================================================

name: CD React (Build & Push Docker Image)

on:
  push:
    branches: [master]
    tags:    ["v*.*.*"]

env:
  IMAGE: ghcr.io/groupmspr/health-ia-frontend

jobs:
  build-and-push:
    name: Build & Push image Docker (prod)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=ref,event=branch
          labels: |
            org.opencontainers.image.description=MSPR Frontend HealthAI Coach - Ilan - Anthony - Diana

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max